name: Ottawa Job Pipeline

on:
  workflow_dispatch:
  schedule:
  # Runs daily at 12:00 PM UTC (which is 8:00 AM in Ottawa during EDT)
    - cron: '0 12 * * *'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          #cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas google-search-results

      - name: Fetch Ottawa Job Postings via SerpApi
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python fetch_jobs.py

      - name: Clean and Categorize Ottawa Job Postings
        run: python clean_job_postings.py

      - name: Commit and push updated datasets
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          
          git add raw_ottawa_jobs.csv cleaned_ottawa_jobs.csv
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Ottawa job fetch & clean: $(date +'%Y-%m-%d')" && git push)
